name: daily-horoscope-sara

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-push
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate and send Sara's horoscope
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SARA_EMAIL: ${{ secrets.SARA_EMAIL }}
        run: python generate_sara.py

      - name: Commit updated files
        run: |
          git config user.name "horoscope-bot"
          git config user.email "horoscope-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add sara/index.html used_images_sara.json
          git diff --cached --quiet || git commit -m "sara: $(date -u +%Y-%m-%d)"
          git push
