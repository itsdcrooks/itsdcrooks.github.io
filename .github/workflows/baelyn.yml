name: Baelyn Horoscope

on:
  schedule:
    # Fires at 06:00 UTC = 1:00 AM CDT (summer) / 12:00 AM CST (winter).
    # Script generates immediately, then waits until 5:00 AM Central before sending email.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Baelyn horoscope generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BAELYN_EMAIL: ${{ secrets.BAELYN_EMAIL }}
        run: python generate_baelyn.py

      - name: Commit and push outputs
        run: |
          git config user.name "horoscope-bot"
          git config user.email "bot@horoscope"
          git add docs/baelyn/index.html used_images_baelyn.json used_pools.json used_quotes_baelyn.json
          git diff --cached --quiet || git commit -m "baelyn: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push || true
