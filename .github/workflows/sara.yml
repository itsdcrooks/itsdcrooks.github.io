name: daily-horoscope-sara

on:
  schedule:
    # 13:00 UTC = 7:00 AM CST / 8:00 AM CDT — same cadence as Daniel's
    - cron: "0 13 * * *"
  workflow_dispatch:  # manual run from the Actions tab

permissions:
  contents: write

# Prevent Sara's job and Daniel's job from pushing at the same instant
concurrency:
  group: daily-push
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic pyswisseph

      - name: Generate and send Sara's horoscope
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          SARA_EMAIL:        ${{ secrets.SARA_EMAIL }}
        run: python generate_sara.py

      - name: Commit updated files
        run: |
          git config user.name  "horoscope-bot"
          git config user.email "horoscope-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add docs/sara/index.html used_images_sara.json
          git diff --cached --quiet || git commit -m "sara: $(date -u +%Y-%m-%d)"
          git push
